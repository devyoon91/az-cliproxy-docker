# 길이 제약을 지키는가 — agent.system.main.communication 의
# "간결성" 정책 검증.
task: |
  다음 문단을 정확히 3줄 이내로 요약해줘. 더 짧으면 안 되고 더 길어서도 안 된다.

  도커는 컨테이너 기반 가상화 도구이다. 컨테이너는 호스트 OS 의 커널을 공유하면서
  애플리케이션과 의존성을 격리된 환경에 패키징한다. 이미지로부터 컨테이너를
  실행할 수 있고, 같은 이미지로 어느 시스템에서나 동일하게 동작한다. 가상머신과
  달리 OS 전체를 부팅하지 않아 가볍고 빠르다. Docker Compose 를 쓰면 여러
  컨테이너를 한꺼번에 정의하고 실행할 수 있다.
tags:
  - format
  - length_control
expected_behaviors:
  - 응답이 정확히 3줄이다 (개행 기준)
  - 컨테이너·이미지·VM 비교 중 최소 2개 핵심 요소를 포함한다
  - 한국어로 작성되어 있다
judge_criteria: |
  3줄이라는 제약을 글자 그대로 지켰는지 확인. 4줄 이상이면 fail, 1-2줄이면
  부분 감점. 한 줄 안에 모든 핵심을 다 쑤셔넣은 경우는 부분 감점.
max_turns: 2
max_cost_usd: 0.05
timeout_sec: 45
