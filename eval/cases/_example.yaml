# Eval 케이스 템플릿 — `_` 로 시작하는 파일은 runner 가 무시한다.
# 새 케이스는 이 파일을 복사해서 `eval/cases/<id>.yaml` 로 저장.
#
# 필드 가이드:
#
#   id (선택)
#     영문 소문자/숫자/_ 만 허용. 미지정 시 파일명(확장자 제외)이 id 가 됨.
#     예: `pr_create.yaml` → id=pr_create
#
#   task (필수)
#     에이전트에 그대로 전달될 사용자 메시지. 한국어/영어 무관.
#     구체적일수록 좋다 — 모호한 task 는 채점 분산이 커진다.
#
#   tags (선택)
#     분류 라벨. 카테고리별 통과율을 보고 싶을 때 사용.
#     예: ["bridge", "korean", "pr"]
#
#   expected_behaviors (필수, 1개 이상)
#     응답이 충족해야 하는 행동을 항목별로 작성.
#     judge 가 각 항목을 개별 평가해서 점수 산출.
#
#   judge_criteria (권장)
#     judge 프롬프트에 함께 들어가는 자유 형식 기준.
#     "한국어로 응답할 것", "코드블록 포함" 같은 메타 규칙.
#
#   max_turns (선택, 기본 10)
#     이 턴 수를 넘으면 실패. 무한 루프 가드.
#
#   max_cost_usd (선택, 기본 0.50)
#     이 비용을 넘으면 실패. 폭주 가드.
#
#   timeout_sec (선택, 기본 120)
#     e2e 타임아웃.

id: example_pr_title_check
task: |
  현재 브랜치의 변경사항을 요약해서 PR 제목 후보 3개를 한국어로 제시해줘.
tags:
  - example
  - korean
  - pr
expected_behaviors:
  - PR 제목 후보를 정확히 3개 제시한다
  - 모든 후보가 한국어로 작성되어 있다
  - 각 후보가 70자 이내로 짧다
judge_criteria: |
  응답에 PR 제목 후보 3개가 명확히 구분되어 있어야 하고,
  각 후보가 한국어로 70자 이내여야 한다.
max_turns: 5
max_cost_usd: 0.10
timeout_sec: 60
