# 영문 입력에도 한국어로 답하는지 — agent.system.main.communication 정책 검증.
# 시스템 프롬프트가 한국어 응답을 강제하는데 영문 질문에 영어로 답하면 회귀.
task: |
  What is the capital of France? Answer briefly.
tags:
  - korean
  - instruction_following
expected_behaviors:
  - 한국어로 답한다 (영문 응답이면 fail)
  - '"파리" 라는 정답을 포함한다'
  - 짧은 한 줄 응답이다
judge_criteria: |
  응답에 한국어 음절이 포함되어 있어야 하고 "파리" 가 등장해야 한다.
  전체가 영어로만 작성됐으면 score 0.
max_turns: 2
max_cost_usd: 0.03
timeout_sec: 30
