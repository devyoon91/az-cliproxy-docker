version: "3.8"

services:
  # ── CLIProxy: Claude Code CLI → OpenAI-compatible API ──
  cliproxy:
    image: eceasy/cli-proxy-api:v6.9.18
    container_name: cliproxy
    ports:
      - "8317:8317"   # OpenAI-compatible API
      - "8085:8085"   # Web Management UI
      - "54545:54545" # OAuth callback
    volumes:
      - ./cliproxy/config.yaml:/CLIProxyAPI/config.yaml
      - ./cliproxy/auth:/root/.cli-proxy-api
      - ./cliproxy/logs:/CLIProxyAPI/logs
    restart: unless-stopped
    networks:
      - az-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8317/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Agent Zero: AI Agent Framework ──
  agent-zero:
    # Custom image: extends agent0ai/agent-zero:v1.20 with weasyprint for the
    # local chat_pdf_export plugin. See agent-zero/Dockerfile.
    build: ./agent-zero
    image: az-cliproxy-docker-agent-zero:v1.20-pdf
    container_name: agent-zero
    ports:
      - "50001:80"
    env_file:
      - .env
    environment:
      - TZ=Asia/Seoul  # /today /week 집계 및 로그 타임스탬프를 KST 로 일관화 (issue #24)
      - GIT_USER_NAME=${GIT_USER_NAME}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    volumes:
      - ./agent-zero/work_dir:/a0/work_dir
      - ./agent-zero/memory:/a0/memory
      - ./agent-zero/logs:/a0/logs
      - ./agent-zero/prompts:/a0/prompts
      - ./agent-zero/git-init.sh:/a0/git-init.sh:ro
      - ./agent-zero/extensions/python/agent_init/_90_usage_tracker.py:/a0/extensions/python/agent_init/_90_usage_tracker.py:ro
      # M2: wrap litellm.acompletion to capture real streaming usage + Anthropic cache fields (issue #13)
      - ./agent-zero/extensions/python/agent_init/_91_chunk_usage_probe.py:/a0/extensions/python/agent_init/_91_chunk_usage_probe.py:ro
      # Task post-report system (M1: raw capture) — issue #1
      - ./agent-zero/lib/task_report.py:/a0/helpers/task_report.py:ro
      # M3: shared model-pricing helper (cache-aware cost_usd in task JSON + /usage)
      - ./agent-zero/lib/pricing.py:/a0/helpers/pricing.py:ro
      # M2.1: startup sweep marks leftover pending JSONs as orphaned (cancel/kill)
      - ./agent-zero/extensions/python/agent_init/_80_task_report_sweep.py:/a0/extensions/python/agent_init/_80_task_report_sweep.py:ro
      - ./agent-zero/extensions/python/monologue_start/_50_task_report_begin.py:/a0/extensions/python/monologue_start/_50_task_report_begin.py:ro
      - ./agent-zero/extensions/python/message_loop_start/_50_task_report_iter.py:/a0/extensions/python/message_loop_start/_50_task_report_iter.py:ro
      - ./agent-zero/extensions/python/tool_execute_before/_50_task_report_tool_start.py:/a0/extensions/python/tool_execute_before/_50_task_report_tool_start.py:ro
      - ./agent-zero/extensions/python/tool_execute_after/_50_task_report_tool_end.py:/a0/extensions/python/tool_execute_after/_50_task_report_tool_end.py:ro
      - ./agent-zero/extensions/python/chat_model_call_after/_50_task_report_llm.py:/a0/extensions/python/chat_model_call_after/_50_task_report_llm.py:ro
      # Wave 2 (issue #24): util_model_call_after fires from agent.py but had
      # no extension listening — ~71 Haiku calls/day were missing from task JSON.
      - ./agent-zero/extensions/python/util_model_call_after/_50_task_report_util_llm.py:/a0/extensions/python/util_model_call_after/_50_task_report_util_llm.py:ro
      - ./agent-zero/extensions/python/monologue_end/_50_task_report_finish.py:/a0/extensions/python/monologue_end/_50_task_report_finish.py:ro
      # Override upstream skill-recall extension: raise description truncate
      # 220 → 400 so Korean-domain guard phrases survive into the prompt.
      - ./agent-zero/extensions/python/message_loop_prompts_after/_63_recall_relevant_skills.py:/a0/extensions/python/message_loop_prompts_after/_63_recall_relevant_skills.py:ro
      - ./agent-zero/settings.json:/a0/usr/settings.json
      # Persist plugin overrides — chiefly /a0/usr/plugins/_model_config/config.json
      # which holds the active chat/utility model selection. Without this mount
      # `docker compose up --force-recreate` wipes the override and AZ falls
      # back to default_config.yaml — whose default chat_model name has a typo
      # (claude-sonnet-4.6 with a DOT) that Anthropic rejects with 404.
      - ./agent-zero/usr-plugins:/a0/usr/plugins
    entrypoint: ["/bin/sh", "-c", "sh /a0/git-init.sh && exec /exe/initialize.sh ${BRANCH:-main}"]
    depends_on:
      cliproxy:
        condition: service_started
    restart: unless-stopped
    networks:
      - az-net

  # ── Telegram Bridge: 양방향 알림 + 지시 ──
  telegram-bridge:
    build: ./telegram-bridge
    container_name: telegram-bridge
    environment:
      - TZ=Asia/Seoul  # /today /week 경계 + daily usage reset 을 KST 로 일관화 (issue #24)
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - AZ_API_URL=http://agent-zero:80
      # M5-E: web dashboard token (issue #23). Empty/unset disables /dashboard
      # and /api/stats. Set to any non-empty string to enable.
      - DASHBOARD_TOKEN=${DASHBOARD_TOKEN:-}
      # Voice → STT → AZ. Empty/unset disables voice handling (handler still
      # registers but replies "음성 인식이 비활성화" instead of crashing).
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - STT_MODEL=${STT_MODEL:-whisper-1}
      - STT_LANGUAGE=${STT_LANGUAGE:-ko}
      # /eval judge — Anthropic Haiku 호출용. 미설정이면 /eval 이 친절한 에러
      # 메시지로 거부 (#114).
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - ./docs:/app/docs:ro
      - ./GUIDE.md:/app/GUIDE.md:ro
      - ./README.md:/app/README.md:ro
      # M4: read AZ task JSONs for /today, /week, /tasks aggregation commands
      - ./agent-zero/logs/tasks:/app/tasks:ro
      # M5-A: persist /budget settings + alert cooldown across restarts (issue #19)
      - ./telegram-bridge/data:/app/data
      # /eval (#114): bridge가 eval 케이스를 읽고, runs/ 출력 + baseline.json
      # 갱신을 디스크에 쓴다. rw 마운트 — `eval/runs/` 는 .gitignore 대상이고
      # `eval/baseline.json` 은 사용자가 의도적으로 갱신할 때만 변경된다.
      - ./eval:/app/eval
    ports:
      - "8443:8443"   # 알림 webhook (내부용)
    depends_on:
      agent-zero:
        condition: service_started
    restart: unless-stopped
    networks:
      - az-net

networks:
  az-net:
    driver: bridge
